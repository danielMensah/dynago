baseURL = 'https://danielmensah.github.io/dynago/'
languageCode = 'en-us'
title = 'DynaGo'
theme = 'hugo-book'

enableGitInfo = true
disablePathToLower = true

[params]
  BookTheme = 'auto'
  BookToC = true
  BookSection = 'docs'
  BookSearch = true
  BookLogo = '/dynago/logo.svg'
  BookRepo = 'https://github.com/danielMensah/dynago'
  BookEditPath = 'edit/main/content'

[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
